name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    name: Code-Qualität (PHP 8.3)
    runs-on: ubuntu-latest

    steps:
      - name: Quellcode auschecken
        uses: actions/checkout@v5

      - name: PHP 8.3 einrichten
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, xml, ctype, iconv, intl, pdo, pdo_mysql, curl, zip
          coverage: pcov
          tools: composer:v2

      - name: Composer-Cache laden
        uses: actions/cache@v5
        with:
          path: vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Abhängigkeiten installieren
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Security-Audit (Produktiv-Stack)
        run: composer audit --no-dev

      - name: Code-Style prüfen
        run: composer cs-check

      - name: XML-Lint (services.xml und Co.)
        run: composer lint:xml

      - name: Twig-Lint (Storefront-Templates, Lexer-only)
        run: composer lint:twig

      - name: Statische Analyse (PHPStan Level 8)
        run: composer phpstan

      - name: Tests mit Coverage ausführen
        run: composer coverage

      - name: Coverage-Schwellen prüfen
        run: composer coverage:gate

      - name: Coverage-Report als Artefakt
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-clover
          path: coverage.xml
          if-no-files-found: warn

  js-tests:
    name: JS-Unit-Tests (Storefront-Plugin)
    runs-on: ubuntu-latest

    steps:
      - name: Quellcode auschecken
        uses: actions/checkout@v5

      - name: Node 22 einrichten
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: JS-Unit-Tests ausführen
        run: node --test tests/Js/cart-splitter.test.mjs
